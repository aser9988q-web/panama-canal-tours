<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panama Canal Tours - Choose Language</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .buttons { margin-top: 30px; }
        .btn {
            text-decoration: none;
            padding: 15px 30px;
            margin: 0 10px;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            transition: opacity 0.3s;
        }
        .btn-en { background-color: #0056b3; }
        .btn-es { background-color: #d9534f; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Panama Canal Tours</h1>
        <p>Please select your language / Por favor seleccione su idioma</p>
        <div class="buttons">
            <a href="en/index.html" class="btn btn-en">English</a>
            <a href="es/index.html" class="btn btn-es">Español</a>
        </div>
    </div>
</body>
</html>
