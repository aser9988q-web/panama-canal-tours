<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Panama Canal Tours</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header-info {
            text-align: right;
            color: #666;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .payments-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .payments-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: #28a745;
            color: white;
        }

        .btn-approve:hover {
            background: #218838;
        }

        .btn-reject {
            background: #dc3545;
            color: white;
        }

        .btn-reject:hover {
            background: #c82333;
        }

        .btn-details {
            background: #007bff;
            color: white;
        }

        .btn-details:hover {
            background: #0056b3;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .modal h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal p {
            margin-bottom: 10px;
            color: #666;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🏛️ Admin Dashboard</h1>
                <p>Panama Canal Tours - Payment Management</p>
            </div>
            <div class="header-info">
                <p>Last updated: <span id="lastUpdate">--:--</span></p>
                <a href="/" style="color: #667eea; text-decoration: none; margin-top: 10px; display: inline-block;">← Back to Home</a>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>Total Payments</h3>
                <div class="number" id="totalPayments">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <div class="number" id="pendingPayments">0</div>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <div class="number" id="completedPayments">0</div>
            </div>
            <div class="stat-card">
                <h3>Rejected</h3>
                <div class="number" id="rejectedPayments">0</div>
            </div>
        </div>

        <div class="payments-section">
            <h2>💳 Payments</h2>
            <div id="messageContainer"></div>
            <div id="loadingContainer" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading payments...</p>
            </div>
            <div id="paymentsContainer"></div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDetailsModal()">&times;</span>
            <h2>Payment Details</h2>
            <div id="detailsContent"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeDetailsModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Reject Modal -->
    <div id="rejectModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRejectModal()">&times;</span>
            <h2>Reject Payment</h2>
            <p>Are you sure you want to reject this payment?</p>
            <textarea id="rejectReason" placeholder="Enter rejection reason..." style="height: 80px;"></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeRejectModal()">Cancel</button>
                <button class="btn-reject" onclick="confirmReject()">Reject</button>
            </div>
        </div>
    </div>

    <script>
        let currentPaymentId = null;

        async function loadPayments() {
            const loadingContainer = document.getElementById('loadingContainer');
            const paymentsContainer = document.getElementById('paymentsContainer');
            const messageContainer = document.getElementById('messageContainer');

            loadingContainer.style.display = 'block';
            paymentsContainer.innerHTML = '';
            messageContainer.innerHTML = '';

            try {
                const response = await fetch('/api/admin/payments');
                const payments = await response.json();

                loadingContainer.style.display = 'none';

                if (payments.length === 0) {
                    paymentsContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No pending payments</p>
                        </div>
                    `;
                    updateStats(payments);
                    return;
                }

                let html = '<table><thead><tr><th>Email</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>';

                payments.forEach(payment => {
                    const date = new Date(payment.payment_date).toLocaleDateString();
                    const statusClass = `status-${payment.status.replace(/_/g, '-')}`;
                    const statusText = payment.status.replace(/_/g, ' ').toUpperCase();

                    html += `
                        <tr>
                            <td>${payment.email}</td>
                            <td>$${payment.amount.toFixed(2)}</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>${date}</td>
                            <td>
                                <div class="action-buttons">
                                    <button class="btn-details" onclick="showDetails('${payment.id}', '${payment.email}', '${payment.amount}', '${payment.status}')">Details</button>
                                    <button class="btn-approve" onclick="approvePayment('${payment.id}')">Approve</button>
                                    <button class="btn-reject" onclick="showRejectModal('${payment.id}')">Reject</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                paymentsContainer.innerHTML = html;
                updateStats(payments);

                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                loadingContainer.style.display = 'none';
                messageContainer.innerHTML = `<div class="error">❌ Error loading payments: ${error.message}</div>`;
            }
        }

        function updateStats(payments) {
            const total = payments.length;
            const pending = payments.filter(p => p.status.includes('pending')).length;
            const completed = payments.filter(p => p.status === 'completed').length;
            const rejected = payments.filter(p => p.status === 'rejected').length;

            document.getElementById('totalPayments').textContent = total;
            document.getElementById('pendingPayments').textContent = pending;
            document.getElementById('completedPayments').textContent = completed;
            document.getElementById('rejectedPayments').textContent = rejected;
        }

        async function approvePayment(paymentId) {
            if (!confirm('Are you sure you want to approve this payment?')) return;

            try {
                const response = await fetch(`/api/admin/payments/${paymentId}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✅ Payment approved successfully!', 'success');
                    setTimeout(() => loadPayments(), 1000);
                } else {
                    showMessage(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            }
        }

        function showRejectModal(paymentId) {
            currentPaymentId = paymentId;
            document.getElementById('rejectModal').classList.add('show');
            document.getElementById('rejectReason').value = '';
        }

        function closeRejectModal() {
            document.getElementById('rejectModal').classList.remove('show');
            currentPaymentId = null;
        }

        async function confirmReject() {
            const reason = document.getElementById('rejectReason').value.trim();

            if (!reason) {
                alert('Please enter a rejection reason');
                return;
            }

            try {
                const response = await fetch(`/api/admin/payments/${currentPaymentId}/reject`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✅ Payment rejected successfully!', 'success');
                    closeRejectModal();
                    setTimeout(() => loadPayments(), 1000);
                } else {
                    showMessage(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            }
        }

        function showDetails(paymentId, email, amount, status) {
            const detailsContent = document.getElementById('detailsContent');
            const statusClass = `status-${status.replace(/_/g, '-')}`;
            const statusText = status.replace(/_/g, ' ').toUpperCase();

            detailsContent.innerHTML = `
                <p><strong>Payment ID:</strong> ${paymentId}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Amount:</strong> $${parseFloat(amount).toFixed(2)}</p>
                <p><strong>Status:</strong> <span class="status-badge ${statusClass}">${statusText}</span></p>
            `;

            document.getElementById('detailsModal').classList.add('show');
        }

        function closeDetailsModal() {
            document.getElementById('detailsModal').classList.remove('show');
        }

        function showMessage(message, type) {
            const messageContainer = document.getElementById('messageContainer');
            const className = type === 'success' ? 'success' : 'error';
            messageContainer.innerHTML = `<div class="${className}">${message}</div>`;

            setTimeout(() => {
                messageContainer.innerHTML = '';
            }, 5000);
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            const detailsModal = document.getElementById('detailsModal');
            const rejectModal = document.getElementById('rejectModal');

            if (event.target === detailsModal) {
                detailsModal.classList.remove('show');
            }
            if (event.target === rejectModal) {
                rejectModal.classList.remove('show');
            }
        };

        // Load payments on page load
        loadPayments();

        // Refresh payments every 30 seconds
        setInterval(loadPayments, 30000);
    </script>
</body>
</html>
